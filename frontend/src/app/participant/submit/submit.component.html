<div class="submit-page">
  <div class="page-header">
    <h1>Level 3 – Advanced</h1>
    <p class="page-sub">Best score: 88,200 · 10 submissions</p>
  </div>

  <div class="content-card">
    <h2 class="card-title">Level resources</h2>
    <div class="resource-list">
      <div class="resource-row" *ngFor="let res of resources">
        <span class="resource-name">{{ res.name }}</span>
        <button
          class="btn-resource"
          [ngClass]="res.action === 'View' ? 'green' : 'purple'"
        >
          {{ res.action }}
        </button>
      </div>
    </div>
  </div>

  <div class="content-card">
    <h2 class="card-title">New Submission</h2>

    <div class="form-group">
      <label>Solution output file*</label>
      <div
        class="drop-zone"
        (click)="outputInput.click()"
        (dragover)="$event.preventDefault()"
        (drop)="onDropOutput($event)"
      >
        <input #outputInput type="file" style="display:none" (change)="onOutputSelected($event)" accept=".txt,.csv,.json" />
        <span>{{ outputFileName || 'Drop output file here or browser' }}</span>
        <span class="file-hint" *ngIf="!outputFileName">.txt &nbsp;.csv &nbsp;.json</span>
      </div>
    </div>

    <div class="form-group">
      <label>Source code archive (.zip)*</label>
      <div
        class="drop-zone"
        (click)="zipInput.click()"
        (dragover)="$event.preventDefault()"
        (drop)="onDropZip($event)"
      >
        <input #zipInput type="file" style="display:none" (change)="onZipSelected($event)" accept=".zip" />
        <span>{{ zipFileName || 'Drop .zip here or browse' }}</span>
      </div>
    </div>

    <button class="btn-submit" (click)="onSubmit()">Submit</button>
  </div>
</div>
