<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-hackathon">Hackathon</span>
      <span class="brand-platform">Platform</span>
    </div>
    <p class="auth-subtitle">Create a new account</p>

    <form (ngSubmit)="onCreateAccount()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First name</label>
          <input
            id="firstName"
            type="text"
            [(ngModel)]="firstName"
            name="firstName"
          />
        </div>
        <div class="form-group">
          <label for="lastName">Last name</label>
          <input
            id="lastName"
            type="text"
            [(ngModel)]="lastName"
            name="lastName"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
  
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
      </div>

      <button type="submit" class="btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
