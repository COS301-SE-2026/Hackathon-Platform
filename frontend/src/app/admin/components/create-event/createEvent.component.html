<div class="create-event-page">
  <div class="page-header">
    <h1>Create new event</h1>
    <p class="page-subtitle">Configure all event parameters before publishing</p>
  </div>

  <!-- Add error message display -->
  @if (errorMessage) {
    <div class="error-message">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="createEvent()" class="event-form">
    <div class="form-section">
      <h2 class="section-heading">Basic information :</h2>

      <div class="form-group">
        <label for="eventName">Event name *</label>
        <input
          id="eventName"
          type="text"
          [(ngModel)]="form.eventName"
          name="eventName"
          placeholder="Hackathon 2024"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate">Start date &amp; time *</label>
          <input
            id="startDate"
            type="datetime-local"
            [(ngModel)]="form.startDate"
            name="startDate"
            required
          />
        </div>
        <div class="form-group">
          <label for="duration">Duration (hours) *</label>
          <input
            id="duration"
            type="number"
            [(ngModel)]="form.duration"
            name="duration"
            placeholder="48"
            min="1"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="teamSizeLimit">Team Size Limit *</label>
        <input
          id="teamSizeLimit"
          type="number"
          [(ngModel)]="form.teamSizeLimit"
          name="teamSizeLimit"
          placeholder="4"
          min="1"
          required
        />
      </div>
    </div>

    <div class="form-section">
      <h2 class="section-heading">Visibility &amp; Access</h2>
      <div class="toggle-group" role="group" aria-label="Visibility selection">
        <button
          type="button"
          class="toggle-option"
          [class.selected]="form.visibility === 'PUBLIC'"
          (click)="form.visibility = 'PUBLIC'"
        >
          <span class="toggle-title">Public</span>
          <span class="toggle-desc">Anyone can Register</span>
        </button>
        <button
          type="button"
          class="toggle-option"
          [class.selected]="form.visibility === 'PRIVATE'"
          (click)="form.visibility = 'PRIVATE'"
        >
          <span class="toggle-title">Private</span>
          <span class="toggle-desc">Registration key required</span>
        </button>
      </div>

      <!-- Show registration key field only for private events -->
      @if (form.visibility === 'PRIVATE') {
        <div class="form-group" style="margin-top: 16px;">
          <label for="registrationKey">Registration Key *</label>
          <input
            id="registrationKey"
            type="text"
            [(ngModel)]="form.registrationKey"
            name="registrationKey"
            placeholder="Enter registration key"
            required
          />
        </div>
      }
    </div>

    <!--<div class="form-section">
      <h2 class="section-heading">Branding</h2>
      <label class="field-label" for="bannerInput">Event banner/Logo</label>
      <button type="button"
        class="drop-zone" 
         (click)="triggerFileInput()" 
         (keydown.enter)="triggerFileInput()" 
         (dragover)="onDragOver($event)" 
         (drop)="onDrop($event)"
         tabindex="0">
         <input id="bannerInput" type="file" #fileInput style="display:none" (change)="onFileSelected($event)" accept="image/*" />
         <span>+ Drop image here or browse</span>
         @if (form.bannerFileName) {
         <span class="drop-hint">{{ form.bannerFileName }}</span>
         }
      </div>
    </div>-->

    <div class="form-section">
      <h2 class="section-heading">Rules &amp; Description</h2>
      <textarea
        [(ngModel)]="form.description"
        name="description"
        rows="4"
        placeholder="Enter event rules and description..."
      ></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onSaveDraft()" [disabled]="isLoading">
        @if (isLoading) {
          <span>Saving...</span>
        } @else {
          <span>Save draft</span>
        }
      </button>
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        @if (isLoading) {
          <span>Creating...</span>
        } @else {
          <span>Create Event</span>
        }
      </button>
    </div>
  </form>
</div>
