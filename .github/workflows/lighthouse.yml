#   builds the Angular app for production
#   runs Lighthouse against the static dist folder
#   checks scores against thresholds in lighthouserc.json
#   uploads the HTML report as a downloadable artifact
#   posts a public report link to the PR on temporary public storage
# limits are set low for now, they will increase as we improve the app

name: Lighthouse CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build Angular
      - name: Build Angular app (production)
        working-directory: frontend
        run: npm run build -- --configuration=production

      # Install Lighthouse CI
      - name: Install LHCI
        run: npm install -g @lhci/cli@0.13.x

      # Run Lighthouse against the built static file
      - name: Run Lighthouse CI
        run: lhci autorun --config=lighthouserc.json || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14