name: CI

on:
  push:
    branches: [ main, dev]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run CI on'
        required: true
        default: 'main'

jobs:

#backend - build + unit tests
# compiles spring boot, runs JUnit, cov report for SonarCloud
  backend:
    name: Backend - Build & tests
    runs-on: ubuntu-latest

    #starts real PostgreSQL container for integration tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hackathon_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Check code formatting
        working-directory: backend
        run: mvn spotless:check

      #- name: Run Checkstyle
      #  working-directory: backend
      #  run: mvn checkstyle:check

      - name: Build and run tests
        working-directory: backend
        env:
          #this is pointing to the CI postgres container for now, when we do CD it will point to Azure
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hackathon_test
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop 
        run: mvn clean verify

      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  # Front end - Build + Unit Tests
  #Install Angular dependancies, runs Karma/Jasmine unit tests and builds the app

  frontend:
    name: Frontend - Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependancies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Run unit tests (headless)
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build Angular app
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

