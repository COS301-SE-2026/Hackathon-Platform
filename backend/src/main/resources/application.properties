# Base config for Spring boot

spring.application.name=hackathon-platform

#DB Stuff
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hackathon_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hackathon_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hackathon_password}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
# Flyway for DB migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
 
# JWT Auth
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-minimum-256-bits-long}
jwt.expiration-ms=86400000
 
#Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
 
#Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
